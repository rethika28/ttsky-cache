# Tiny Tapeout project information
project:
  title:        "Direct Mapped Cache Memory"
  author:       "Rethika"
  discord:      ""
  description:  "Simple 4-line direct mapped cache memory using Verilog"
  language:     "Verilog"
  clock_hz:     100000000

  # Tile size
  tiles: "1x1"

  # Top module
  top_module:  "tt_um_example"

  # Source files
  source_files:
    - "project.v"

# Pin configuration
pinout:

  # Inputs
  ui[0]: "Address bit 0"
  ui[1]: "Address bit 1"

  ui[2]: "Write data bit 0"
  ui[3]: "Write data bit 1"
  ui[4]: "Write data bit 2"
  ui[5]: "Write data bit 3"
  ui[6]: "Write data bit 4"
  ui[7]: "Write data bit 5"

  # Outputs
  uo[0]: "Read data bit 0"
  uo[1]: "Read data bit 1"
  uo[2]: "Read data bit 2"
  uo[3]: "Read data bit 3"
  uo[4]: "Read data bit 4"
  uo[5]: "Read data bit 5"
  uo[6]: "Unused"
  uo[7]: "Unused"

  # Bidirectional pins
  uio[0]: "Write Enable"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change
yaml_version: 6
